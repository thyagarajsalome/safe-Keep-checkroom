<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background rounded rectangle -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#grad)" />
  <!-- Lock / Vault box icon in center with subtle glow -->
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="128" y="128" width="256" height="256" rx="32" ry="32" />
    <circle cx="256" cy="256" r="48" />
    <path d="M256 96v32" />
    <path d="M256 384v32" />
    <path d="M96 256h32" />
    <path d="M384 256h32" />
  </g>
</svg>
